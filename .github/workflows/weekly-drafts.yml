name: Email Machine — Weekly Drafts (SUPERSEDED — manual only)

# SUPERSEDED by rolling-drafts.yml (daily, rolling 7-day window). The Sunday cron
# is disabled so the two don't both generate. Kept for manual one-off batch runs.

on:
  workflow_dispatch: {}   # manual only — the daily rolling workflow handles scheduling

permissions:
  contents: read
  id-token: write   # required by claude-code-action@v1

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare mockup renderer (Chrome + Pillow)
        run: |
          pip install --quiet pillow || pip3 install --quiet pillow || true
          google-chrome --version || sudo apt-get update -y && sudo apt-get install -y google-chrome-stable || true

      - uses: anthropics/claude-code-action@v1
        with:
          # OAuth subscription token (from `claude setup-token`) — NOT an API key.
          # Must use the dedicated claude_code_oauth_token input.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Read PROMPT.md in this repository and follow its instructions exactly, end to end."
          claude_args: |
            --model claude-opus-4-8
            --allowedTools Bash
            --max-turns 30
        env:
          # Notion integration token with access to the Email Machine pages.
          NOTION_TOKEN: ${{ secrets.NOTION_BLUON_TOKEN }}
          CHROME_BIN: google-chrome   # used to render the email mockup image

      - name: Render mockups for new drafts
        run: python scripts/regenerate.py --fill
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_BLUON_TOKEN }}
          CHROME_BIN: google-chrome

name: Email Machine — Weekly Drafts

# Generates next week's Bluon email drafts into the Notion Email Calendar
# (Status = Ready for Review) using Claude Code on a Max subscription via OAuth.
# No Anthropic API key / no per-token billing.

on:
  schedule:
    # Sundays 15:13 UTC (~8:13 AM PT) — drafts ready before the week starts.
    # Adjust to taste. Off-:00 minute on purpose.
    - cron: "13 15 * * 0"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: read
  id-token: write   # required by claude-code-action@v1

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare mockup renderer (Chrome + Pillow)
        run: |
          pip install --quiet pillow || pip3 install --quiet pillow || true
          google-chrome --version || sudo apt-get update -y && sudo apt-get install -y google-chrome-stable || true

      - uses: anthropics/claude-code-action@v1
        with:
          # OAuth subscription token (from `claude setup-token`) — NOT an API key.
          # Must use the dedicated claude_code_oauth_token input.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Read PROMPT.md in this repository and follow its instructions exactly, end to end."
          claude_args: |
            --model claude-opus-4-8
            --allowedTools Bash
            --max-turns 30
        env:
          # Notion integration token with access to the Email Machine pages.
          NOTION_TOKEN: ${{ secrets.NOTION_BLUON_TOKEN }}
          CHROME_BIN: google-chrome   # used to render the email mockup image

      - name: Render + attach mockups
        run: python scripts/attach_mockups.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_BLUON_TOKEN }}
          CHROME_BIN: google-chrome

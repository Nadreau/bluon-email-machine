name: TEMP — Smartlead API probe

# Temporary, read-only: dumps real Smartlead response shapes to the run log so the
# Anevo reporting restructure (active-campaign segmentation + A/B tests) can be
# designed against the actual API. Delete together with scripts/probe_smartlead.py.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe Smartlead
        env:
          SMARTLEAD_API_KEY: ${{ secrets.SMARTLEAD_API_KEY }}
        run: python scripts/probe_smartlead.py

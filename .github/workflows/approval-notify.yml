name: Email Machine — Approval → Slack

# When a draft's Approved box is checked, ping Kelsey to queue the send.
#
# SCHEDULE DISABLED (Jun 2026): notify_approved.py still polls the OLD schema
# ("Approved" / "Sent to Kelsey" properties that no longer exist), so the cron
# only burned Actions minutes and never fired. Left as manual-only until the
# script is repointed to the live schema (gate on "Ready to Go"; dedupe on the
# presence of a Hubspot Email url or a new "Notified" checkbox) AND the
# SLACK_WEBHOOK_URL secret is set. Re-enable the schedule then.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify on approvals
        run: python scripts/notify_approved.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_BLUON_TOKEN }}
          # Set this secret to a Slack Incoming Webhook for Kelsey's channel/DM
          # to go live. Until then this step prints a dry run and sends nothing.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
